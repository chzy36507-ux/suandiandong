name: 更新DeepSeek价格

on:
  schedule:
    # 每3天凌晨1点UTC运行
    - cron: '0 1 */3 * *'
  workflow_dispatch:

jobs:
  crawl-deepseek:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 运行DeepSeek价格爬虫
        run: python scripts/deepseek_cloud.py

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_output/deepseek_prices.json
          git diff --staged --quiet || git commit -m "data: 自动更新DeepSeek价格 $(date -u '+%Y-%m-%d')"
          git push
