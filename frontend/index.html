<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算电通 - 全国电价 × DeepSeek 价格查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --peak: #ff6b35;
            --normal: #4ecdc4;
            --valley: #45b7d1;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --text: #e8e8e8;
            --muted: #6b7280;
        }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glow-peak { box-shadow: 0 0 30px rgba(255, 107, 53, 0.3); }
        .glow-normal { box-shadow: 0 0 30px rgba(78, 205, 196, 0.3); }
        .glow-valley { box-shadow: 0 0 30px rgba(69, 183, 209, 0.3); }
        .price-card {
            background: linear-gradient(145deg, var(--bg-card), #1a1a25);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .price-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.1);
        }
        .tab-active { 
            background: linear-gradient(90deg, var(--peak), var(--normal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .live-dot {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .skeleton {
            background: linear-gradient(90deg, #1a1a25 25%, #252530 50%, #1a1a25 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 顶部导航 -->
    <nav class="border-b border-white/5 backdrop-blur-sm sticky top-0 z-50 bg-[#0a0a0f]/80">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#ff6b35] to-[#45b7d1] flex items-center justify-center">
                    <span class="text-white text-xl">⚡</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold">算电通</h1>
                    <p class="text-xs text-gray-500">全国电价 × DeepSeek 价格</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="live-dot w-2 h-2 rounded-full bg-green-400"></span>
                <span class="text-xs text-gray-500" id="lastUpdate">数据加载中...</span>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Tab 切换 -->
        <div class="flex gap-1 mb-8 bg-[#12121a] p-1 rounded-xl w-fit">
            <button onclick="switchTab('electricity')" id="tab-electricity" class="px-6 py-2 rounded-lg text-sm font-medium transition-all tab-active bg-white/5">
                📊 全国电价
            </button>
            <button onclick="switchTab('deepseek')" id="tab-deepseek" class="px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">
                🤖 DeepSeek 价格
            </button>
        </div>

        <!-- 电价查询区 -->
        <div id="panel-electricity">
            <!-- 搜索框 -->
            <div class="mb-8">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="搜索省份..." 
                        class="w-full md:w-96 px-4 py-3 pl-12 rounded-xl bg-[#12121a] border border-white/5 focus:border-[#4ecdc4] outline-none transition-all"
                        oninput="filterProvinces()">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <p class="text-xs text-gray-500 mt-2" id="statsText">共 0 个省份已入库</p>
            </div>

            <!-- 电价卡片网格 -->
            <div id="electricityGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- JS 动态填充 -->
            </div>
        </div>

        <!-- DeepSeek 价格区 -->
        <div id="panel-deepseek" class="hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="deepseekGrid">
                <!-- JS 动态填充 -->
            </div>

            <!-- 价格计算器 -->
            <div class="mt-8 p-6 rounded-2xl bg-[#12121a] border border-white/5">
                <h3 class="text-lg font-medium mb-4">💰 费用计算器</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">输入 Tokens (百万)</label>
                        <input type="number" id="calcInput" value="1" step="0.1" min="0"
                            class="w-full px-4 py-2 rounded-lg bg-[#0a0a0f] border border-white/5 focus:border-[#4ecdc4] outline-none mono"
                            onchange="calculateCost()">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">输出 Tokens (百万)</label>
                        <input type="number" id="calcOutput" value="0.5" step="0.1" min="0"
                            class="w-full px-4 py-2 rounded-lg bg-[#0a0a0f] border border-white/5 focus:border-[#4ecdc4] outline-none mono"
                            onchange="calculateCost()">
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">模型</label>
                        <select id="calcModel" class="w-full px-4 py-2 rounded-lg bg-[#0a0a0f] border border-white/5 focus:border-[#4ecdc4] outline-none"
                            onchange="calculateCost()">
                            <option value="deepseek-chat">deepseek-chat</option>
                            <option value="deepseek-reasoner">deepseek-reasoner</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 p-4 rounded-xl bg-gradient-to-r from-[#ff6b35]/10 to-[#45b7d1]/10 border border-white/5">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">预估费用</span>
                        <span class="text-2xl font-bold mono" id="calcResult">$0.00 (¥0.00)</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="border-t border-white/5 mt-16 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
            <p>数据来源：各省发改委公告、DeepSeek 官方定价页面</p>
            <p class="mt-1">数据仅供参考，以官方最新公告为准 | 自动更新周期：电价12天，DeepSeek价格3天</p>
            <p class="mt-2">
                <a href="https://github.com/chzy36507-ux/suandiandong" target="_blank" class="text-[#4ecdc4] hover:underline">GitHub 开源</a>
            </p>
        </div>
    </footer>

    <script>
        // 数据源：GitHub Raw JSON
        const DATA_BASE = 'https://raw.githubusercontent.com/chzy36507-ux/suandiandong/main/data_output';
        let electricityData = null;
        let deepseekData = null;

        // 加载数据
        async function loadData() {
            try {
                const [elecRes, dsRes] = await Promise.all([
                    fetch(`${DATA_BASE}/electricity.json?t=${Date.now()}`),
                    fetch(`${DATA_BASE}/deepseek_prices.json?t=${Date.now()}`)
                ]);
                
                electricityData = await elecRes.json();
                deepseekData = await dsRes.json();
                
                document.getElementById('lastUpdate').textContent = 
                    `更新于 ${new Date(electricityData.updated_at).toLocaleString('zh-CN')}`;
                document.getElementById('statsText').textContent = 
                    `共 ${electricityData.total} 个省份已入库，${electricityData.failed_provinces?.length || 0} 个省份数据待补充`;
                
                renderElectricity();
                renderDeepseek();
                calculateCost();
            } catch (e) {
                console.error('数据加载失败', e);
                document.getElementById('lastUpdate').textContent = '数据加载失败，请刷新重试';
            }
        }

        // 渲染电价卡片
        function renderElectricity(filter = '') {
            const grid = document.getElementById('electricityGrid');
            const data = electricityData?.data || [];
            const filtered = data.filter(p => p.province.toLowerCase().includes(filter.toLowerCase()));
            
            grid.innerHTML = filtered.map(p => `
                <div class="price-card rounded-2xl p-5 transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-medium">${p.province}</h3>
                        <span class="text-xs text-gray-500">${p.effective_date || '未知'}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3 text-center">
                        <div class="p-3 rounded-xl bg-[#ff6b35]/10 glow-peak">
                            <div class="text-xs text-[#ff6b35] mb-1">峰时</div>
                            <div class="text-xl font-bold mono">${p.peak_price ? p.peak_price.toFixed(2) : '-'}</div>
                            <div class="text-xs text-gray-500">元/kWh</div>
                        </div>
                        <div class="p-3 rounded-xl bg-[#4ecdc4]/10 glow-normal">
                            <div class="text-xs text-[#4ecdc4] mb-1">平时</div>
                            <div class="text-xl font-bold mono">${p.normal_price ? p.normal_price.toFixed(2) : '-'}</div>
                            <div class="text-xs text-gray-500">元/kWh</div>
                        </div>
                        <div class="p-3 rounded-xl bg-[#45b7d1]/10 glow-valley">
                            <div class="text-xs text-[#45b7d1] mb-1">谷时</div>
                            <div class="text-xl font-bold mono">${p.valley_price ? p.valley_price.toFixed(2) : '-'}</div>
                            <div class="text-xs text-gray-500">元/kWh</div>
                        </div>
                    </div>
                    ${p.peak_hours ? `<p class="text-xs text-gray-500 mt-3">⏰ 峰时: ${p.peak_hours}</p>` : ''}
                    ${p.source ? `<p class="text-xs text-gray-600 mt-1 truncate">📌 ${p.source}</p>` : ''}
                </div>
            `).join('');
        }

        // 渲染 DeepSeek 价格
        function renderDeepseek() {
            const grid = document.getElementById('deepseekGrid');
            const data = deepseekData?.data || [];
            
            grid.innerHTML = data.map(m => `
                <div class="price-card rounded-2xl p-6 transition-all duration-300">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-2xl">🤖</div>
                        <div>
                            <h3 class="font-medium">${m.model}</h3>
                            <p class="text-xs text-gray-500">DeepSeek API</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 rounded-lg bg-white/5">
                            <span class="text-gray-400">输入 (缓存命中)</span>
                            <span class="mono font-medium">$${m.cached_input_usd || '-'} /M</span>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-lg bg-white/5">
                            <span class="text-gray-400">输入 (缓存未命中)</span>
                            <span class="mono font-medium">$${m.input_usd || '-'} /M <span class="text-xs text-gray-500">(¥${m.input_cny || '-'})</span></span>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-lg bg-white/5">
                            <span class="text-gray-400">输出</span>
                            <span class="mono font-medium">$${m.output_usd || '-'} /M <span class="text-xs text-gray-500">(¥${m.output_cny || '-'})</span></span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 计算费用
        function calculateCost() {
            if (!deepseekData?.data) return;
            
            const inputTokens = parseFloat(document.getElementById('calcInput').value) || 0;
            const outputTokens = parseFloat(document.getElementById('calcOutput').value) || 0;
            const model = document.getElementById('calcModel').value;
            
            const modelData = deepseekData.data.find(m => m.model === model);
            if (!modelData) return;
            
            const inputCost = inputTokens * (modelData.input_usd || 0);
            const outputCost = outputTokens * (modelData.output_usd || 0);
            const totalUsd = inputCost + outputCost;
            const totalCny = totalUsd * (deepseekData.usd_to_cny || 7.25);
            
            document.getElementById('calcResult').textContent = 
                `$${totalUsd.toFixed(4)} (¥${totalCny.toFixed(2)})`;
        }

        // Tab 切换
        function switchTab(tab) {
            document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => {
                t.classList.remove('tab-active', 'bg-white/5');
                t.classList.add('text-gray-400');
            });
            
            document.getElementById(`panel-${tab}`).classList.remove('hidden');
            const activeTab = document.getElementById(`tab-${tab}`);
            activeTab.classList.add('tab-active', 'bg-white/5');
            activeTab.classList.remove('text-gray-400');
        }

        // 搜索过滤
        function filterProvinces() {
            const filter = document.getElementById('searchInput').value;
            renderElectricity(filter);
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
